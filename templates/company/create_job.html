{% extends "base.html" %}

{% block title %}Post New Job{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Create Job Opportunity</h2>
            <a href="{{ url_for('company_workspace.company_home') }}"
                class="btn btn-outline-secondary btn-sm">Cancel</a>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('company_workspace.create_job') }}">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">JOB TITLE</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Senior Software Engineer"
                            required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">LOCATION</label>
                            <input type="text" name="location" class="form-control"
                                placeholder="e.g. Remote, Bangalore..." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">SALARY RANGE</label>
                            <input type="text" name="salary" class="form-control" placeholder="e.g. 10 - 15 LPA"
                                required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">REQUIRED SKILLS</label>
                            <input type="text" name="skills" class="form-control"
                                placeholder="e.g. Python, SQL..." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">EXPERIENCE RANGE</label>
                            <input type="text" name="experience" class="form-control"
                                placeholder="e.g. 0 - 2 years" required>
                        </div>
                    </div>

                    <div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">MINIMUM CGPA</label>
                            <input type="text" name="min_cgpa" class="form-control" placeholder="e.g. 7.5" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted">DEADLINE FOR APPLICATION</label>
                            <input type="date" name="deadline" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">JOB DESCRIPTION</label>
                        <textarea name="about" class="form-control" rows="6"
                            placeholder="Describe the role, requirements, and responsibilities..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Post Job for Approval</button>
                    </div>
                    <div class="text-center mt-3">
                        <small class="text-muted">Note: Your job posting will be reviewed by the admin before going
                            live.</small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
