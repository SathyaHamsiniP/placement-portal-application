<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Registration - Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #f97316;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 3rem 0;
        }

        .register-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 600px;
            padding: 3rem;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            padding: 1rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(249, 115, 22, 0.3);
        }

        .form-control,
        .form-select {
            padding: 0.8rem 1.25rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
        }

        .brand-text {
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--primary-color);
            margin-bottom: 2rem;
            text-align: center;
            font-size: 1.75rem;
        }
    </style>
</head>

<body>
    <div class="register-card">
        <h5 class="text-center mb-4 fw-bold">Register as a Student</h5>

        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@university.edu" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Phone Number</label>
                    <input type="text" name="phone" class="form-control" placeholder="+91 00000 00000" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Branch</label>
                    <select name="branch" class="form-select" required>
                        <option value="">Select Branch</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="IT">IT</option>
                        <option value="MECH">Mechanical</option>
                        <option value="CIVIL">Civil</option>
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">CGPA</label>
                    <input type="number" step="0.01" name="cgpa" class="form-control" placeholder="9.5" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Grad Year</label>
                    <input type="number" name="grad_year" class="form-control" placeholder="2025" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Skills (Comma separated)</label>
                <input type="text" name="skills" class="form-control" placeholder="Python, SQL, React...">
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Upload Resume (PDF only)</label>
                <input type="file" name="resume" class="form-control" accept=".pdf" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">
                Create Account
            </button>
        </form>

        <div class="text-center pt-3 border-top">
            <div class="text-muted small">Already registered? <a href="/login"
                    class="fw-bold text-orange text-decoration-none" style="color: var(--accent-color);">Sign In</a>
            </div>
        </div>
    </div>
</body>

</html>
