<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Company Registration - Campus Placement Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #f97316;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 3rem 0;
        }

        .register-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 520px;
            padding: 3rem;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            padding: 1rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(249, 115, 22, 0.3);
        }

        .form-control {
            padding: 0.8rem 1.25rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
        }

        .brand-text {
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--primary-color);
            margin-bottom: 2.5rem;
            text-align: center;
            font-size: 1.75rem;
        }
    </style>
</head>

<body>
    <div class="register-card">
        <h5 class="text-center mb-4 fw-bold">Register as a Recruiter</h5>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Organization Name</label>
                <input type="text" name="name" class="form-control" placeholder="Acme Corporation" required>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">HR Email</label>
                <input type="email" name="email" class="form-control" placeholder="hr@acme.com" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Industry</label>
                    <input type="text" name="industry" class="form-control" placeholder="E.g. Fintech, AI" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Official Website</label>
                <input type="text" name="website" class="form-control" placeholder="https://www.acme.com">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">
                Register for Portal
            </button>
        </form>

        <div class="text-center pt-3 border-top">
            <div class="text-muted small">Already have access? <a href="/login"
                    class="fw-bold text-orange text-decoration-none" style="color: var(--accent-color);">Sign In</a>
            </div>
        </div>
    </div>
</body>

</html>
