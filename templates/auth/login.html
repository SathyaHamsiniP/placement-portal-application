<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Login - Campus Placement Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            /* Deep Slate */
            --accent-color: #f97316;
            /* Vibrant Orange */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 3rem;
        }

        .btn-dark {
            background-color: var(--primary-color);
            border: none;
            padding: 0.9rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-dark {
            background-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .form-control,
        .form-select {
            padding: 0.8rem 1.25rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 0.95rem;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: var(--accent-color);
            background-color: white;
        }

        .brand-text {
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--primary-color);
            margin-bottom: 2.5rem;
            text-align: center;
            font-size: 1.75rem;
        }

        .register-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .register-links a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2 class="brand-text">Campus Placement Portal</h2>

        <h5 class="text-center mb-4 fw-bold">Sign In</h5>

        {% if error %}
        <div class="alert alert-danger py-2 small border-0 text-center mb-4"
            style="background-color: #fdeded; color: #5f2120;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">ENTER AS</label>
                <select name="role" class="form-select" required>
                    <option value="student">Student</option>
                    <option value="company">Recruiter</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">EMAIL ADDRESS</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-4">
                Login
            </button>
        </form>

        <div class="register-links text-center pt-3 border-top">
            <div class="text-muted small mb-2">New user? Register as</div>
            <a href="/student/signup" class="me-3">Student</a>
            <span class="text-muted">|</span>
            <a href="/company/signup" class="ms-3">Company</a>
        </div>
    </div>

</body>

</html>
